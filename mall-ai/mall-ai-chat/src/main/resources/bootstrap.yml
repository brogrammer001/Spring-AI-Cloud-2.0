# Tomcat
server:
  port: 9994

# Spring
spring:
  application:
    # 应用名称
    name: mall-ai-chat
  ai:
    model:
      embedding: openai
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always   # 首次启动自动建表
            platform: mysql
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${aliQwen-api}
      chat:
        model: qwen3.7-max
      embedding:
        model: Qwen3-Embedding-8B-Q5_K_M
        base-url: http://127.0.0.1:8889/v1 # 2.0版本需要带上 /v1 后缀
        api-key: 123456
    vectorstore:
      weaviate:
        host: 127.0.0.1:18080
        scheme: http
        api-key: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
        filter-field:
          conversationId: TEXT
        object-class: SpringAiWeaviate
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:8848
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:8848
  config:
    # 配置文件格式
    file-extension: yml
    import:
      - nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG
    org.springframework.http: DEBUG
version : '3.8'
services:
  mall-nacos:
    container_name: mall-nacos
    image: nacos/nacos-server:v3.0.2
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=your_auth_token
      - NACOS_AUTH_IDENTITY_KEY=your_identity_key
      - NACOS_AUTH_IDENTITY_VALUE=your_identity_value
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - mall-mysql
  mall-mysql:
    container_name: mall-mysql
    image: mysql:5.7
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]
    environment:
      MYSQL_DATABASE: 'ry-cloud'
      MYSQL_ROOT_PASSWORD: password
  mall-redis:
    container_name: mall-redis
    image: redis
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/mall/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/mall/redis/redis.conf
  mall-nginx:
    container_name: mall-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/mall/projects/mall-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - mall-gateway
    links:
      - mall-gateway
  mall-gateway:
    container_name: mall-gateway
    build:
      context: ./mall/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mall-redis
    links:
      - mall-redis
  mall-auth:
    container_name: mall-auth
    build:
      context: ./mall/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - mall-redis
    links:
      - mall-redis
  mall-modules-system:
    container_name: mall-modules-system
    build:
      context: ./mall/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - mall-redis
      - mall-mysql
    links:
      - mall-redis
      - mall-mysql
  mall-modules-gen:
    container_name: mall-modules-gen
    build:
      context: ./mall/modules/gen
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    depends_on:
      - mall-mysql
    links:
      - mall-mysql
  mall-modules-job:
    container_name: mall-modules-job
    build:
      context: ./mall/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - mall-mysql
    links:
      - mall-mysql
  mall-modules-file:
    container_name: mall-modules-file
    build:
      context: ./mall/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./mall/uploadPath:/home/mall/uploadPath
  mall-visual-monitor:
    container_name: mall-visual-monitor
    build:
      context: ./mall/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
